<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Planner Inteligente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #ffffff;
      --button: #22c55e;
    }

    .light {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #000000;
      --button: #16a34a;
    }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 20px;
      background: var(--card);
    }

    header .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header p {
      margin-top: 10px;
      opacity: 0.8;
      font-size: 14px;
    }

    main {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 280px;
      background: var(--card);
      padding: 20px;
      border-radius: 10px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input, select, button {
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: var(--button);
      color: white;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #334155;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
    }

    .concluido {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .contador {
      font-size: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <div class="topo">
    <h1>Planner Inteligente</h1>
    <button id="tema">🌙</button>
  </div>

  <p>
    Organize seus objetivos semanais, acompanhe seu progresso e mantenha o foco com ajuda de tecnologia.
  </p>
</header>

<main>

  <!-- CONTADOR -->
  <section class="card">
    <h2>Objetivos Concluídos</h2>
    <p id="contador" class="contador">0</p>
  </section>

  <!-- FRASE -->
  <section class="card">
    <h2>Motivação</h2>
    <p id="frase">Carregando...</p>
    <button onclick="carregarFrase()">Nova frase</button>
  </section>

  <!-- FORM -->
  <section class="card">
    <h2>Novo Objetivo</h2>

    <form id="form">
      <input type="text" id="titulo" placeholder="Seu objetivo" required>

      <label>Prioridade</label>
      <select id="prioridade">
        <option value="baixa">Baixa</option>
        <option value="media">Média</option>
        <option value="alta">Alta</option>
      </select>

      <label>Data</label>
      <input type="date" id="data" required>

      <button type="submit">Adicionar</button>
    </form>
  </section>

  <!-- LISTA -->
  <section class="card">
    <h2>Objetivos em andamento</h2>
    <ul id="lista"></ul>
  </section>

</main>

<script src="script.js"></script>

  <footer>
    <p>
      Fale conosco: 
      <a href="mailto:seuemail@email.com">
        ana.silva45@celsoonline.com.br
      </a>
    </p>
    <p>Criado por Ana B.</p>
  </footer>
</body>
</html>
