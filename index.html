<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Inteligente</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="assinatura">
        Desenvolvido por Ana B.
    </div>

    <header>

        <h1>Planner Inteligente</h1>

        <div class="acoes-topo">

            <button id="temaBtn">
                🌙 Tema
            </button>

        </div>

    </header>

    <main>

        <section class="card">

            <h2>Progresso</h2>

            <div class="estatisticas">

                <p>Total: <span id="totalObjetivos">0</span></p>

                <p>Concluídos: <span id="concluidos">0</span></p>

                <p>Pendentes: <span id="pendentes">0</span></p>

            </div>

            <div class="barra">
                <div id="progresso"></div>
            </div>

            <p id="percentual">0%</p>

        </section>

        <section class="card">

            <h2>Novo Objetivo</h2>

            <form id="formObjetivo">

                <input
                    type="text"
                    id="titulo"
                    placeholder="Digite um objetivo"
                    required
                >

                <select id="prioridade">

                    <option value="Baixa">Baixa</option>
                    <option value="Média">Média</option>
                    <option value="Alta">Alta</option>

                </select>

                <input
                    type="date"
                    id="data"
                    required
                >

                <button type="submit">
                    Adicionar Objetivo
                </button>

            </form>

        </section>

        <section class="card">

            <h2>Filtrar</h2>

            <select id="filtro">

                <option value="todos">Todos</option>

                <option value="pendentes">Pendentes</option>

                <option value="concluidos">Concluídos</option>

            </select>

        </section>

        <section class="card">

            <h2>Objetivos</h2>

            <ul id="listaObjetivos"></ul>

        </section>

        <section class="card">

            <h2>Consultar CEP</h2>

            <input
                type="text"
                id="cep"
                maxlength="8"
                placeholder="Digite o CEP"
            >

            <button id="buscarCep">
                Buscar CEP
            </button>

            <div id="resultadoCep"></div>

        </section>

        <section class="card">

            <h2>Histórico de Consultas</h2>

            <ul id="historicoCep"></ul>

        </section>

        <section class="card">

            <h2>Motivação</h2>

            <img
                loading="lazy"
                src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=800"
                alt="Produtividade"
                class="imagemMotivacao"
            >

            <p id="fraseMotivacao">
                Disciplina supera motivação.
            </p>

        </section>

    </main>

    <footer>

        Criado para fins de prática •

        anaboliveira2319@gmail.com

    </footer>

    <script src="script.js"></script>

</body>

</html>
